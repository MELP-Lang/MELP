<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Önizleme</title>
  <link rel="stylesheet" href="assets/styles/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: auto;
      background: #111;
    }
    #form-canvas {
      position: relative;
      display: block;
    }
    /* Tasarım modu kalıntılarını gizle */
    #form-canvas .resize-handle  { display: none !important; }
    #form-canvas .canvas-info    { display: none !important; }
    #form-canvas .rubber-band    { display: none !important; }

    /* Tüm widget'lar tıklanabilir olsun */
    #form-canvas .canvas-widget {
      cursor: default !important;
      outline: none !important;
      box-shadow: none !important;
      user-select: none;
    }
    #form-canvas .canvas-widget:hover {
      outline: none !important;
    }
    /* İçerik wrapper'ın pointer event engelini kaldır; input kapsam dışı */
    #form-canvas .canvas-widget > *:not(.resize-handle):not(input):not(textarea) {
      pointer-events: none !important;
    }
    #form-canvas .canvas-widget input,
    #form-canvas .canvas-widget textarea {
      pointer-events: auto !important;
    }
    /* Tasarım rozet pseudo-elementlerini gizle (🎬 animasyon, 📐 responsive) */
    #form-canvas .canvas-widget::after,
    #form-canvas .canvas-widget::before {
      display: none !important;
    }
    /* Arka plan ızgarasını kaldır */
    #form-canvas {
      background-image: none !important;
    }
    /* Buton efekti */
    #form-canvas .canvas-widget.widget-button {
      cursor: pointer !important;
      transition: filter 0.08s, transform 0.08s;
    }
    #form-canvas .canvas-widget.widget-button:hover {
      filter: brightness(1.15);
    }
    #form-canvas .canvas-widget.widget-button.preview-active {
      filter: brightness(0.85);
      transform: translateY(1px) scale(0.98);
    }
    /* Checkbox / Radio */
    #form-canvas .canvas-widget.widget-checkbox,
    #form-canvas .canvas-widget.widget-radio {
      cursor: pointer !important;
    }
    #form-canvas .canvas-widget.widget-checkbox.preview-checked::before,
    #form-canvas .canvas-widget.widget-radio.preview-checked::before {
      display: block !important;
      content: '\2713';
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--accent-color, #4a90e2);
    }
  </style>
</head>
<body>
  <div id="form-canvas"></div>
  <script src="preview-form.js"></script>
</body>
</html>

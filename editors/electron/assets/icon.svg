<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1e1e2e"/>
  <!-- Grid dots (canvas hint) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="2" fill="#3e3e5e" opacity="0.5"/>
  </pattern>
  <rect x="20" y="20" width="472" height="472" rx="60" fill="url(#dots)"/>
  <!-- M - letter mark -->
  <text x="256" y="300" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="280" fill="#0e639c" text-anchor="middle" dominant-baseline="middle"
        letter-spacing="-10">M</text>
  <!-- Accent bar -->
  <rect x="80" y="370" width="352" height="16" rx="8" fill="#0e639c" opacity="0.7"/>
  <!-- Small label -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="48" fill="#888"
        text-anchor="middle" dominant-baseline="middle" letter-spacing="8">ELIP</text>
</svg>
